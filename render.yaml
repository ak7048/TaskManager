databases:
  - name: taskmanager-db
    plan: free
    databaseName: taskmanager
    user: taskmanager

services:
  - type: web
    name: taskmanager-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: taskmanager-db
          property: connectionString

  - type: web
    name: taskmanager-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_API_BASE_URL
        value: "https://taskmanager-backend-g0dy.onrender.com"
